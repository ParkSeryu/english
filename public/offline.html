<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0f766e" />
    <title>오프라인 - 영어공부</title>
    <style>
      body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #f8fafc; color: #0f172a; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      main { width: min(90vw, 420px); border-radius: 28px; background: white; padding: 28px; box-shadow: 0 24px 60px rgba(15, 23, 42, 0.12); }
      .badge { color: #0f766e; font-size: 12px; font-weight: 900; letter-spacing: 0.18em; text-transform: uppercase; }
      h1 { margin: 12px 0; font-size: 28px; line-height: 1.15; }
      p { margin: 0; color: #475569; line-height: 1.7; }
      button { margin-top: 24px; width: 100%; border: 0; border-radius: 999px; background: #0f766e; color: white; padding: 14px 18px; font-weight: 900; font-size: 16px; }
    </style>
  </head>
  <body>
    <main>
      <div class="badge">English Study</div>
      <h1>지금은 오프라인이에요</h1>
      <p>네트워크 연결이 돌아오면 다시 암기 큐와 표현 보관함을 불러올 수 있습니다.</p>
      <button type="button" onclick="location.reload()">다시 시도</button>
    </main>
  </body>
</html>
